    <script>
      (() => {
        const blankDataIcon =
          "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 fill=%22%23000%22 fill-opacity=%220.01%22/%3E%3C/svg%3E";
        const blankFileIcon = "blank-favicon-20260517.ico?v=" + Date.now();
        const setBlankFavicon = () => {
          document.querySelectorAll("link[rel*='icon']").forEach((link) => link.remove());

          const icon = document.createElement("link");
          icon.rel = "icon";
          icon.href = blankDataIcon;
          document.head.appendChild(icon);

          const shortcutIcon = document.createElement("link");
          shortcutIcon.rel = "shortcut icon";
          shortcutIcon.href = blankFileIcon;
          document.head.appendChild(shortcutIcon);
        };

        setBlankFavicon();
        window.addEventListener("load", setBlankFavicon, { once: true });
      })();
    </script>
